name: Keep Supabase Alive

on:
  schedule:
    # Runs every 5 days at 9:00 AM IST (3:30 UTC)
    - cron: '30 3 */5 * *'
  workflow_dispatch: # Manual trigger option too

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase to keep project active
        run: |
          curl -s \
            -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
            -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}" \
            "${{ secrets.SUPABASE_URL }}/rest/v1/appointments?limit=1" \
            -o /dev/null \
            -w "Status: %{http_code}\n"
          echo "Supabase pinged successfully — project stays active!"
